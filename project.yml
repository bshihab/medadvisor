name: MedAdvisor
options:
  bundleIdPrefix: app.medadvisor
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  MLXSwiftExamples:
    url: https://github.com/ml-explore/mlx-swift-examples
    # main does NOT expose MLXLLM/MLXLMCommon as products — only tagged releases do.
    exactVersion: 2.29.1

targets:
  MedAdvisor:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: MLXSwiftExamples
        product: MLXLLM
      - package: MLXSwiftExamples
        product: MLXLMCommon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.medadvisor.MedAdvisor
        MARKETING_VERSION: "0.0.1"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "MedAdvisor records consultations on-device to give you feedback. Audio never leaves your phone."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "MedAdvisor transcribes recordings on-device. Speech is processed locally and never leaves your phone."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
