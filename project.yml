name: MedAdvisor
options:
  bundleIdPrefix: app.medadvisor
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

packages:
  llama-binary:
    path: llama-binary
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    exactVersion: 1.0.0

targets:
  MedAdvisor:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: rubrics
        buildPhase: resources
    dependencies:
      - package: llama-binary
        product: llama
      - package: WhisperKit
        product: WhisperKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.medadvisor.MedAdvisor
        MARKETING_VERSION: "0.0.1"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "MedAdvisor records consultations on-device to give you feedback. Audio never leaves your phone."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "MedAdvisor transcribes recordings on-device. Speech is processed locally and never leaves your phone."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
