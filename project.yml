name: MedAdvisor
options:
  bundleIdPrefix: app.medadvisor
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

packages:
  llama-binary:
    path: llama-binary

targets:
  MedAdvisor:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: rubrics
        buildPhase: resources
    dependencies:
      - package: llama-binary
        product: llama
      - target: ModelDownloadWidget       # embed the Live Activity widget extension
      - target: ModelAssetsDownloader      # embed the Background Assets downloader extension
    entitlements:
      path: MedAdvisor.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.medadvisor
    info:
      path: MedAdvisor-Info.plist   # generated by xcodegen; Xcode merges it with the INFOPLIST_KEY_* settings below
      properties:
        # Background Assets (Apple-hosted managed asset packs). The app + the
        # downloader extension share this App Group.
        BAAppGroupID: group.app.medadvisor
        BAHasManagedAssetPacks: true
        BAUsesAppleHosting: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.medadvisor.MedAdvisor
        MARKETING_VERSION: "0.0.5"
        CURRENT_PROJECT_VERSION: "5"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "MedAdvisor records consultations on-device to give you feedback. Audio never leaves your phone."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "MedAdvisor transcribes recordings on-device. Speech is processed locally and never leaves your phone."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"

  ModelDownloadWidget:
    type: app-extension
    platform: iOS
    sources:
      - Widget
      - path: Sources/ModelDownloadAttributes.swift   # shared with the app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.medadvisor.MedAdvisor.ModelDownloadWidget
        MARKETING_VERSION: "0.0.5"
        CURRENT_PROJECT_VERSION: "5"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Widget/Info.plist
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: NO

  ModelAssetsDownloader:
    type: extensionkit-extension   # ExtensionFoundation-based (embeds in Extensions/, not PlugIns/)
    platform: iOS
    sources:
      - ModelAssetsDownloader
    entitlements:
      path: ModelAssetsDownloader/ModelAssetsDownloader.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.medadvisor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.medadvisor.MedAdvisor.ModelAssetsDownloader
        MARKETING_VERSION: "0.0.5"
        CURRENT_PROJECT_VERSION: "5"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ModelAssetsDownloader/Info.plist
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: NO
